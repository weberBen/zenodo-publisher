project_name:
  prefix: "TestProject"
  suffix: "-{tag_name}"

main_branch: main
debug: false

compile:
  enabled: false

archive:
  format: zip
  dir: null

hash_algorithms: [sha256]

signing:
  sign: false

zenodo:
  api_url: "https://sandbox.zenodo.org/api"
  concept_doi: ""
  force_update: false

generated_files:
  project:
    publishers:
      file_destination: [zenodo]

prompt_validation_level: danger
